name: Update GitHub Readme Streak Stats

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC
  push:
    branches:
      - main
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  update-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Streak Stats SVG
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Anbu-00001"
          git config --global user.email "anbuchelvanganesan.cse2024@citchennai.net"
          git add profile/streak.svg
          if git diff --staged --quiet; then
            echo "No changes in streak stats."
          else
            git commit -m "chore: update github readme streak stats [skip ci]"
            git push
          fi
